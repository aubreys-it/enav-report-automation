name: Deploy HR Scraper

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build and Push using Azure's native 'acr build' - no local Docker needed
      - name: Build and push image to ACR
        run: |
          az acr build --registry acrhrreport01 --image hr-automation:${{ github.sha }} .

      # Update the existing Container App Job to use the new image
      - name: Update Container App Job
        run: |
          az containerapp job update \
            --name job-hr-report-scraper \
            --resource-group rg-hr-automation \
            --image acrhrreport01.azurecr.io/hr-automation:${{ github.sha }}